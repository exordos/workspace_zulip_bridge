build:
  deps:
    - dst: /opt/workspace-zulip-bridge
      path:
        src: ..
      exclude:
        - .git
        - .tox
        - .pytest_cache
        - .ruff_cache
        - __pycache__
        - "*/__pycache__"
        - "*.pyc"
        - build
        - dist
        - workspace_zulip_bridge.egg-info

  elements:
    - manifest: manifests/workspace_zulip_bridge.yaml.j2
      images:
        - name: workspace-zulip-bridge
          format: zst
          profile: exordos_base
          script: images/install.sh
          override:
            disk_size: "10G"
